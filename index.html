<!DOCTYPE HTML>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <link rel="stylesheet" href="css/index.css?v=42">
  <link rel="stylesheet" href="css/tooltip.css?v=42">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <link rel="icon" type="favicon.ico" href="favicon.ico?v=5">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.8.6/css/academicons.min.css">
  <!-- Apply saved theme before render to avoid a flash. Default is LIGHT (OS setting is ignored). -->
  <script>try{if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');}catch(e){}</script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>

  <title>Hyojoon Park | Academic Website</title>
</head>

<body>
  <div id="header-bar">
  </div>
  <div id="div-main">
    <!-- PROFILE SIDEBAR (left column on desktop, centered block on mobile) -->
    <aside id="profile-sidebar">
      <div id="row-intro"></div>
    </aside>

    <main id="content-main">
      <table id="table-main">
        <tbody>
          <!-- RESEARCH (About Me) -->
          <tr id="row-research">
          </tr>

          <!-- NEWS -->
          <!-- <tr class="row-breaker"></tr>
          <tr id="row-news">
          </tr> -->

          <!-- EDUCATION -->
          <tr class="row-breaker"></tr>
          <tr id="row-education">
          </tr>

          <!-- WORK -->
          <tr class="row-breaker"></tr>
          <tr id="row-work">
          </tr>

          <!-- PUBLICATIONS -->
          <tr class="row-breaker"></tr>
          <tr id="row-publication">
          </tr>

          <!-- SERVICES -->
          <tr class="row-breaker"></tr>
          <tr id="row-services">
          </tr>

          <!-- OTHER WORK (Codes) -->
          <tr class="row-breaker"></tr>
          <tr id="row-otherwork">
          </tr>

          <tr class="row-breaker"></tr>

          <!-- APP DEV -->
          <tr id="row-appdev">
          </tr>

          <tr class="row-breaker"></tr>

          <!-- DOC -->
          <tr id="row-doc">
          </tr>

          <tr class="row-breaker"></tr>

          <!-- YOUTUBE -->
          <tr id="row-youtube">
          </tr>
        </tbody>
      </table>
    </main>
  </div>

  <!-- Floating "back to top" button (fixed to the viewport's bottom-right corner) -->
  <button id="scroll-top-btn" type="button" aria-label="Scroll to top" title="Back to top">
    <i class="fas fa-arrow-up"></i>
  </button>

  <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-analytics.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-firestore.js"></script>
  <script src="/js/index.js"></script>
  <script>
    $(function () {
      // Always fetch section partials fresh so a stale cached intro.html can't linger.
      $.ajaxSetup({ cache: false });

      // Floating "back to top" button — fast, fixed-duration scroll (native
      // behavior:'smooth' scales with distance and feels slow on a long page).
      $('#scroll-top-btn').on('click', function () {
        var start = window.pageYOffset || document.documentElement.scrollTop;
        if (start <= 0) return;
        var duration = 300;                 // ms — lower = faster
        var t0 = null;
        function step(now) {
          if (t0 === null) t0 = now;
          var p = Math.min((now - t0) / duration, 1);
          var eased = 1 - Math.pow(1 - p, 3);   // easeOutCubic
          window.scrollTo(0, Math.round(start * (1 - eased)));
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });

      // Dark / light mode toggle (icon only; the button lives in intro.html and is
      // loaded via AJAX, so use a delegated click handler and render after it loads).
      function renderDarkModeBtn() {
        var dark = document.documentElement.classList.contains('dark');
        $("#darkmode-btn").html(dark
          ? '<i class="fas fa-sun"></i>'
          : '<i class="fas fa-moon"></i>');
        // hint shows the mode you'll switch to (matches the icon)
        $("#darkmode-tip").text(dark ? 'Light mode' : 'Dark mode');
      }
      $(document).on('click', '#darkmode-btn', function () {
        var dark = document.documentElement.classList.toggle('dark');
        try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch (e) {}
        renderDarkModeBtn();
      });

      // Gameplay video controls (delegated so they work for videos injected
      // via the section partials). Each button acts on the video in its cell.
      function mediaVideoFor(btn) {
        var pair = btn.closest('.media-pair');
        if (pair) return pair.querySelector('.vertical-video');
        // Fallback for single-video cells (e.g. the cloth-sim row): the video in the same cell.
        var cell = btn.closest('.tb-td-left');
        return cell ? cell.querySelector('video') : null;
      }

      // Play / pause the inline video and swap the button icon.
      $(document).on('click', '.media-play', function () {
        var v = mediaVideoFor(this);
        if (!v) return;
        var icon = this.querySelector('i');
        if (v.paused) {
          delete v.dataset.userPaused;              // user wants it playing
          var p = v.play();
          if (p && p.catch) p.catch(function () {});
          if (icon) icon.className = 'fas fa-pause';
        } else {
          v.dataset.userPaused = '1';               // keep it paused even when scrolled back
          v.pause();
          if (icon) icon.className = 'fas fa-play';
        }
      });

      // Lazy playback: videos have no `autoplay` and preload="none", so nothing
      // downloads until they scroll into view. This starts them then (loading +
      // playing) and pauses them when they leave, so the initial page load stays
      // tiny (~1-2 MB) instead of eagerly pulling every video (~10 MB).
      var videoIO = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          var v = e.target;
          if (e.isIntersecting) {
            if (v.paused && !v.dataset.userPaused) {
              var p = v.play();
              if (p && p.catch) p.catch(function () {});
            }
          } else if (!v.paused) {
            v.pause();
          }
        });
      }, { rootMargin: '300px 0px' });

      function observeLazyVideos() {
        document.querySelectorAll('.vertical-video, video.img-zoom').forEach(function (v) {
          if (!v.dataset.lazyObserved) {
            v.dataset.lazyObserved = '1';
            videoIO.observe(v);
          }
        });
      }
      // Run now and again as AJAX-injected sections arrive.
      observeLazyVideos();
      new MutationObserver(observeLazyVideos)
        .observe(document.documentElement, { childList: true, subtree: true });

      // Click a carousel image to open it full-size in a new tab. A small movement
      // threshold means a scroll/swipe drag doesn't count as a click.
      var appImgDown = { x: 0, y: 0 };
      $(document).on('pointerdown', '.app-scroll-item', function (e) {
        appImgDown.x = e.clientX; appImgDown.y = e.clientY;
      });
      $(document).on('click', '.app-scroll-item', function (e) {
        if (Math.abs(e.clientX - appImgDown.x) > 8 || Math.abs(e.clientY - appImgDown.y) > 8) return;
        var src = this.currentSrc || this.src;
        if (src) window.open(src, '_blank');
      });

      // Open the video file in a new browser tab.
      function openVideoInBrowser(v) {
        var src = v && (v.currentSrc || v.src);
        if (src) window.open(src, '_blank');
      }

      // Full-screen button: open the video in a new browser tab.
      $(document).on('click', '.media-fs', function () {
        openVideoInBrowser(mediaVideoFor(this));
      });

      // Clicking the video itself does the same.
      $(document).on('click', '.vertical-video', function () {
        openVideoInBrowser(this);
      });

      // Clicking the square thumbnail in a video row opens that image in a new tab.
      $(document).on('click', '.tb-td-left--media .media-stack .img-zoom', function () {
        var src = this.currentSrc || this.src;
        if (src) window.open(src, '_blank');
      });

      // Generic loader: if the partial contains <tr>, replace the placeholder row.
      // Otherwise, inject the HTML as cells inside the existing <tr>.
      function insertRow(rowId, url, afterInsert) {
        $.get(url, function (html) {
          var trimmed = (html || "").trim();
          var hasTR = /<\s*tr[\s>]/i.test(trimmed);    // any <tr ...> in the fragment?
          var $row = $("#" + rowId);

          if (hasTR) {
            // The partial returns one or more <tr> rows -> swap the placeholder row.
            $row.replaceWith(trimmed);
          } else {
            // The partial returns only <td> cells -> keep the row and inject cells.
            $row.html(trimmed);
          }

          if (typeof afterInsert === "function") afterInsert();
        });
      }

      // Load all sections
      insertRow("row-intro", "intro.html", renderDarkModeBtn);
      insertRow("row-education", "education.html");
      insertRow("row-research", "research.html");
      insertRow("row-news", "news.html");
      insertRow("row-work", "work.html");
      insertRow("row-otherwork", "otherwork.html");
      insertRow("row-services", "services.html");
      insertRow("row-appdev", "appdev.html");
      insertRow("row-youtube", "youtube.html");

      // Publications needs its expand/collapse wiring after load
      insertRow("row-publication", "publication.html", function () {
        // After the content is loaded, attach the event listeners
        $(".pub-toggle-btn").off("click").on("click", function () {
          let $btn = $(this);
          let $content = $($btn.closest('tr').next('tr').find('.pub-toggle-content'));
          let isToggled = $btn.data('toggled');
          if (isToggled) {
            $content.slideUp();
            $btn.data('toggled', false);
          } else {
            $content.slideDown();
            $btn.data('toggled', true);
          }
          $btn.text($btn.data('toggled') ? "Collapse" : "Expand");
        });

        // Global toggle
        $(".pub-toggle-btn-global").off("click").on("click", function () {
          let isToggled = $(this).data('toggled');
          if (isToggled) {
            $('.pub-toggle-content').slideUp();
            $(this).data('toggled', false);
            $('.pub-toggle-btn').data('toggled', false);
          } else {
            $('.pub-toggle-content').slideDown();
            $(this).data('toggled', true);
            $('.pub-toggle-btn').data('toggled', true);
          }
          let after = $(this).data('toggled');
          $(".pub-toggle-btn").text(after ? "Collapse" : "Expand");
          $(this).text(after ? "Collapse all" : "Expand all");
        });

        $(".pub-toggle-btn-global").data('toggled', false);
        $(".pub-toggle-btn").data('toggled', false);
        $(".pub-toggle-btn-global").text('Expand all');
        $(".pub-toggle-btn").text('Expand');
        $('.pub-toggle-content').hide();
      });

      // Add link previews to all links
      function addLinkPreviews() {
        $('a[href]').each(function () {
          var $link = $(this);
          // Skip if already has preview
          if ($link.closest('.tooltip').length > 0 || $link.parent().hasClass('link-with-preview')) {
            return;
          }
          // Skip links that already have a tooltip sibling
          if ($link.siblings('.link-preview-tooltip, .tooltiptext-image').length > 0) {
            return;
          }
          // Skip video links that already have a thumbnail image inside them
          if ($link.hasClass('video-link') || $link.find('img.thumbnail').length > 0) {
            return;
          }

          var href = $link.attr('href');

          if (!href) return;

          // Check if it's an image
          var imageExts = /\.(jpg|jpeg|png|gif|webp|svg)$/i;
          if (imageExts.test(href)) {
            var $wrapper = $('<span class="link-with-preview"></span>');
            var $tooltip = $('<span class="link-preview-tooltip"><img src="' + href + '" alt="Preview"></span>');
            $link.wrap($wrapper);
            $link.after($tooltip);
          }
          // Check if it's a YouTube video
          else if (/youtube\.com|youtu\.be/i.test(href)) {
            var videoId = '';
            // Extract video ID from various YouTube URL formats
            var match;

            // Pattern 1: youtu.be/VIDEO_ID or youtu.be/VIDEO_ID?params
            if (match = href.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/)) {
              videoId = match[1];
            }
            // Pattern 2: youtube.com/watch?v=VIDEO_ID
            else if (match = href.match(/youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/)) {
              videoId = match[1];
            }
            // Pattern 3: youtube.com/embed/VIDEO_ID
            else if (match = href.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/)) {
              videoId = match[1];
            }
            // Pattern 4: youtube.com/v/VIDEO_ID
            else if (match = href.match(/youtube\.com\/v\/([a-zA-Z0-9_-]{11})/)) {
              videoId = match[1];
            }

            if (videoId && videoId.length === 11) {
              var $wrapper = $('<span class="link-with-preview"></span>');
              var imgSrc = 'https://img.youtube.com/vi/' + videoId + '/maxresdefault.jpg';
              var fallbackSrc = 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';
              var $img = $('<img>').attr({
                'src': imgSrc,
                'alt': 'Video preview'
              }).on('error', function () {
                $(this).attr('src', fallbackSrc);
              });
              var $tooltip = $('<span class="link-preview-tooltip"></span>').append($img);
              $link.wrap($wrapper);
              $link.after($tooltip);
            }
          }
          // Check if it's a video file
          else if (/\.(mp4|webm|ogg|mov)$/i.test(href) || /vimeo\.com/i.test(href)) {
            var $wrapper = $('<span class="link-with-preview"></span>');
            var $tooltip = $('<span class="link-preview-tooltip link-text">Video: ' + (href.length > 50 ? href.substring(0, 50) + '...' : href) + '</span>');
            $link.wrap($wrapper);
            $link.after($tooltip);
          }
          // Check if it's a PDF
          else if (/\.pdf$/i.test(href)) {
            var $wrapper = $('<span class="link-with-preview"></span>');
            var $tooltip = $('<span class="link-preview-tooltip link-text">PDF Document</span>');
            $link.wrap($wrapper);
            $link.after($tooltip);
          }
          // For external websites, show URL preview
          else if (href.startsWith('http://') || href.startsWith('https://')) {
            if (!href.includes(window.location.hostname) && !href.startsWith(window.location.origin)) {
              var $wrapper = $('<span class="link-with-preview"></span>');
              var displayUrl = href.replace(/^https?:\/\//, '').replace(/\/$/, '');
              var $tooltip = $('<span class="link-preview-tooltip link-text">' + (displayUrl.length > 40 ? displayUrl.substring(0, 40) + '...' : displayUrl) + '</span>');
              $link.wrap($wrapper);
              $link.after($tooltip);
            }
          }
        });
      }

      // Add previews after all content loads
      setTimeout(addLinkPreviews, 800);
      // Also add when new content is loaded
      $(document).ajaxComplete(function () {
        setTimeout(addLinkPreviews, 200);
      });

      // Also run on DOM ready for any links already present
      $(document).ready(function () {
        setTimeout(addLinkPreviews, 1000);
      });


    });
  </script>
</body>

</html>
